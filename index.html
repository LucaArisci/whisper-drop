<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <meta name="theme-color" content="#07140c" />
    <meta
      name="description"
      content="WhisperDrop runs local audio transcription on-device in your browser."
    />
    <link rel="icon" type="image/svg+xml" href="/icon.svg" />
    <title>WhisperDrop</title>
    <style>
      #root {
        min-height: 100vh;
      }
      .boot-shell {
        margin: 0;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 0.75rem;
        padding: 1.5rem;
        font-family: system-ui, sans-serif;
        background: #000;
        color: #fff;
        text-align: center;
      }
      .boot-shell .boot-hint {
        max-width: 28rem;
        font-size: 0.875rem;
        line-height: 1.45;
        color: rgba(255, 255, 255, 0.72);
      }
      .boot-shell code {
        font-size: 0.85em;
        padding: 0.1em 0.35em;
        border-radius: 4px;
        background: rgba(255, 255, 255, 0.08);
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div class="boot-shell">
        <p><strong>WhisperDrop</strong></p>
        <p>Loading application…</p>
        <p class="boot-hint">
          If this screen stays here, the UI bundle did not load. Use the exact URL from your dev
          terminal (<code>Local:</code> line). With <code>strictPort</code>, if port 24680 is busy,
          free it or run for example <code>npm run dev -- --port 3000</code>.
        </p>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
